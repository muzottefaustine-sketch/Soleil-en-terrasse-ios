workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faustine.soleilterrasse
      xcode: latest
      vars:
        XCODE_PROJECT: "Soleil En Terrasse.xcodeproj"
        XCODE_SCHEME: "Soleil En Terrasse"
        APPLE_TEAM_ID: "74UG5W2ZY8"
    scripts:
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
