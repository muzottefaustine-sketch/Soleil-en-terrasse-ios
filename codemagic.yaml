workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      vars:
        XCODE_PROJECT: "Soleil En Terrasse.xcodeproj"
        XCODE_SCHEME: "Soleil En Terrasse"
        BUNDLE_ID: "com.faustine.soleilterrasse"
      groups:
        - DEFAULT
      xcode: latest
    scripts:
      - name: Set up signing
        script: |
          keychain initialize
          certificate add-certificates --certificate $CM_CERTIFICATE
          provisioning-profiles add --provisioning-profile $CM_PROVISIONING_PROFILE
