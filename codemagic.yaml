workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faustine.soleilterrasse
      vars:
        XCODE_PROJECT: "Soleil En Terrasse.xcodeproj"
        XCODE_SCHEME: "Soleil En Terrasse"
      xcode: latest
    scripts:
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath ~/exports/Soleil.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
