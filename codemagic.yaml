workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faustine.soleilterrasse
      xcode: latest
    scripts:
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild -project "Soleil En Terrasse.xcodeproj" \
            -scheme "Soleil En Terrasse" \
            -configuration Release \
            -archivePath ~/exports/Soleil.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "Soleil En Terrasse.xcodeproj" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
