workflows:
ios-workflow:
name: iOS Workflow
max_build_duration: 60
integrations:
app_store_connect: codemagic
environment:
groups:
- DEFAULT
xcode: latest
scripts:
- name: Set up signing
script: |
keychain initialize
echo $CM_CERTIFICATE | base64 ‚Äìdecode > /tmp/cert.p12
keychain add-certificates ‚Äìcertificate /tmp/cert.p12 ‚Äìcertificate-password $CM_CERTIFICATE_PASSWORD
echo $CM_PROVISIONING_PROFILE | base64 ‚Äìdecode > /tmp/profile.mobileprovision
mkdir -p ‚Äú$HOME/Library/MobileDevice/Provisioning Profiles‚Äù
cp /tmp/profile.mobileprovision ‚Äú$HOME/Library/MobileDevice/Provisioning Profiles/‚Äù
xcode-project use-profiles
- name: Build ipa
script: |
agvtool new-version -all 2
xcode-project build-ipa ‚Äìproject ‚ÄúSoleil En Terrasse.xcodeproj‚Äù ‚Äìscheme ‚ÄúSoleil En Terrasse‚Äù
