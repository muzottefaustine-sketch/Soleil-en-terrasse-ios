workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faustine.soleilterrasse
      xcode: latest
    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles --archive-xcargs "SKIP_INSTALL=NO BUILD_LIBRARY_FOR_DISTRIBUTION=YES"
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --workspace "Soleil En Terrasse.xcodeproj/project.xcworkspace" \
            --scheme "Soleil En Terrasse"
    artifacts:
      - build/ios/ipa/*.ipa
