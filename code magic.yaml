workflows:
  ios-workflow:
    name: iOS Workflow
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.faustine.soleilterrasse
      vars:
        XCODE_WORKSPACE: "Soleil En Terrasse.xcodeproj"
        XCODE_SCHEME: "Soleil En Terrasse"
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcodebuild -project "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath ~/exports/Soleil.xcarchive \
            archive
      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
